<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンタ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>文字数カウンタ</h1>

        <textarea id="textInput" placeholder="ここに文章を入力してください"></textarea>

        <div class="buttons">
            <button id="copyButton">コピー</button>
            <button id="clearButton">クリア</button>
            <button id="restoreButton">復元</button>
        </div>

        <div class="info">
            <p>文字数: <span id="charCount">0</span></p>
            <p>文章数: <span id="sentenceCount">0</span></p>
            <p>改行数: <span id="lineBreakCount">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
